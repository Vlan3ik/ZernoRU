name: Deploy ZernoRU

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-zernoru-main
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run backend tests
        run: dotnet test Backend/Zerno.sln

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install frontend dependencies
        working-directory: FrontEnd
        run: npm ci

      - name: Run frontend tests
        working-directory: FrontEnd
        run: npm test

      - name: Build frontend
        working-directory: FrontEnd
        run: npm run build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      COMPOSE_PROJECT_NAME: zernoru

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare target directory
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/current'"

      - name: Sync repository
        run: |
          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT:-22}" \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docker-compose.override.yml' \
            --exclude 'Backend/bin/' \
            --exclude 'Backend/obj/' \
            --exclude 'FrontEnd/dist/' \
            --exclude 'FrontEnd/node_modules/' \
            --exclude '**/bin/' \
            --exclude '**/obj/' \
            --exclude '.DS_Store' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/current/"

      - name: Start production stack
        run: |
          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' COMPOSE_PROJECT_NAME='$COMPOSE_PROJECT_NAME' bash -s" <<'EOF'
          set -euo pipefail
          cd "$DEPLOY_PATH/current"
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.prod.yml up -d --build --remove-orphans
          docker compose -p "$COMPOSE_PROJECT_NAME" -f docker-compose.prod.yml ps
          EOF
