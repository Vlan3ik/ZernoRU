services:
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    environment:
      POSTGRES_DB: zerno
      POSTGRES_USER: zerno
      POSTGRES_PASSWORD: zerno
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerno -d zerno"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${LAN_BIND:-0.0.0.0}:${POSTGRES_PORT:-15432}:5432"

  minio:
    image: minio/minio:latest
    pull_policy: missing
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zerno
      MINIO_ROOT_PASSWORD: zerno12345
    volumes:
      - minio_data:/data
    ports:
      - "${LAN_BIND:-0.0.0.0}:${MINIO_PORT:-19000}:9000"
      - "${LAN_BIND:-0.0.0.0}:${MINIO_CONSOLE_PORT:-19001}:9001"

  pgadmin:
    image: dpage/pgadmin4:latest
    pull_policy: missing
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin12345
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${LAN_BIND:-0.0.0.0}:${PGADMIN_PORT:-15050}:80"
    depends_on:
      - postgres

  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    pull_policy: missing
    working_dir: /src
    init: true
    command: ["sh", "/docker/backend/dev-entrypoint.sh"]
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=zerno;Username=zerno;Password=zerno
      Jwt__Issuer: Zerno.Api
      Jwt__Audience: Zerno.Web
      Jwt__SigningKey: development-signing-key-change-me
      Jwt__ExpirationMinutes: 120
      Minio__Endpoint: minio:9000
      Minio__AccessKey: zerno
      Minio__SecretKey: zerno12345
      Minio__Bucket: zerno-media
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./Backend:/src
      - ./docker/backend/dev-entrypoint.sh:/docker/backend/dev-entrypoint.sh:ro
      - backend_nuget_cache:/root/.nuget/packages
      - backend_restore_cache:/cache
    ports:
      - "${LAN_BIND:-0.0.0.0}:${BACKEND_PORT:-18080}:5080"
    expose:
      - "5080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/5080'"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 20s

  frontend:
    image: node:22-alpine
    pull_policy: missing
    working_dir: /app
    init: true
    command: ["sh", "/docker/frontend/dev-entrypoint.sh"]
    environment:
      NODE_ENV: development
      NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com/}
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "true"
      NPM_CONFIG_REPLACE_REGISTRY_HOST: "always"
      NPM_CONFIG_FETCH_RETRIES: "10"
      NPM_CONFIG_FETCH_RETRY_FACTOR: "2"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "180000"
      NPM_CONFIG_FETCH_TIMEOUT: "600000"
      NPM_REGISTRY_FALLBACKS: "https://registry.npmjs.org/ https://registry.yarnpkg.com/"
      NPM_INSTALL_ATTEMPTS_PER_REGISTRY: "2"
      API_PROXY_TARGET: http://backend:5080
      APP_PORT: ${APP_PORT:-18081}
      VITE_HMR_CLIENT_PORT: ${APP_PORT:-18081}
      VITE_HMR_HOST: ${LAN_HOST:-}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./FrontEnd:/app
      - ./docker/frontend/dev-entrypoint.sh:/docker/frontend/dev-entrypoint.sh:ro
      - frontend_node_modules:/app/node_modules
      - frontend_npm_cache:/root/.npm
    ports:
      - "${LAN_BIND:-0.0.0.0}:${FRONTEND_PORT:-15173}:5173"
    expose:
      - "5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    pull_policy: missing
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${LAN_BIND:-0.0.0.0}:${APP_PORT:-18081}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
  frontend_node_modules:
  frontend_npm_cache:
  backend_nuget_cache:
  backend_restore_cache:
