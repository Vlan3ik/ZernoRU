services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zerno
      POSTGRES_USER: zerno
      POSTGRES_PASSWORD: zerno
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerno -d zerno"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: zerno
      MINIO_ROOT_PASSWORD: zerno12345
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin12345
      PGADMIN_CONFIG_SERVER_MODE: "True"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=zerno;Username=zerno;Password=zerno
      Jwt__Issuer: Zerno.Api
      Jwt__Audience: Zerno.Web
      Jwt__SigningKey: development-signing-key-change-me
      Jwt__ExpirationMinutes: 120
      Minio__Endpoint: minio:9000
      Minio__AccessKey: zerno
      Minio__SecretKey: zerno12345
      Minio__Bucket: zerno-media
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "5080:5080"
    expose:
      - "5080"

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    depends_on:
      - backend
    expose:
      - "4173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
